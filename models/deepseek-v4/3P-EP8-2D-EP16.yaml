# 3 prefill EP8 workers plus 2 decode EP16 workers, 14 nodes / 56 GPUs.
extends: wide-ep-base.yaml
release: wide-ep-3p-ep8-2d-ep16

roles:
  prefill:
    lws: {replicas: 3}
  decode:
    lws: {size: 4, replicas: 2}
    parallelism: {tp: 1, dp: 16, ep: true}
    vllm:
      moe_backend: auto
      all2all_backend: flashinfer_nvlink_one_sided
