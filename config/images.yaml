# Central image catalog. Use image_ref values such as "vllm.standard" in specs.
vllm:
  standard: vllm/vllm-openai:latest

llm_d:
  release: v0.8.0
  epp: ghcr.io/llm-d/llm-d-inference-scheduler:{release}
  routing_sidecar: ghcr.io/llm-d/llm-d-routing-sidecar:{release}

sidecars:
  dcgm_exporter: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
  node_exporter: quay.io/prometheus/node-exporter:v1.9.0

dev:
  image: quay.io/tms/vllm-dev:deepep-v2
