                  scaleDistribution:
                    type: linear
                  showPoints: auto
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: 'off'
                max: 1
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: 0
                  - color: yellow
                    value: 0.7
                  - color: red
                    value: 0.9
                unit: percentunit
              overrides: []
            options:
              annotations:
                clustering: -1
                multiLane: false
              legend:
                calcs:
                - mean
                - max
                - lastNotNull
                displayMode: table
                placement: bottom
