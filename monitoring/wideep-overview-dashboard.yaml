---
apiVersion: dashboard.grafana.app/v1
kind: Dashboard
metadata:
  name: wideep-overview
spec:
  annotations:
  - kind: AnnotationQuery
    spec:
      builtIn: true
      enable: true
      hide: true
      iconColor: rgba(0, 211, 255, 1)
      name: Annotations & Alerts
      query:
        datasource:
          name: "-- Grafana --"
        group: grafana
        kind: DataQuery
        spec:
          limit: 100
          matchAny: false
          tags: []
          type: dashboard
        version: v0
  cursorSync: 'Off'
  description: WideEP overview metrics for prefill/decode load balancing and throughput
  editable: true
  elements:
    panel-10:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: "${DS_PROMETHEUS}"
                  group: prometheus
                  kind: DataQuery
                  spec:
                    editorMode: code
                    expr: vllm:num_requests_waiting{namespace=~"${namespace}",leaderworkerset_sigs_k8s_io_worker_index=~".+",llm_d_ai_role="decode"}
                    instant: false
                    legendFormat: "{{llm_d_ai_role}} g{{leaderworkerset_sigs_k8s_io_group_index}} r{{engine}}"
                    range: true
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: Number of requests waiting in decode worker queues
        id: 10
        links: []
        title: Decode Waiting Requests
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ''
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 0
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: auto
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: 'off'
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                  - color: green
                    value: 0
              overrides: []
            options:
              annotations:
                clustering: -1
                multiLane: false
              legend:
                calcs:
                - mean
                - max
                - lastNotNull
                displayMode: table
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: single
                sort: none
          version: 13.0.1
    panel-11:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  datasource:
                    name: "${DS_PROMETHEUS}"
                  group: prometheus
                  kind: DataQuery
                  spec:
                    editorMode: code
                    expr: vllm:kv_cache_usage_perc{namespace=~"${namespace}",leaderworkerset_sigs_k8s_io_worker_index=~".+",llm_d_ai_role="prefill"}
                    instant: false
                    legendFormat: "{{llm_d_ai_role}} g{{leaderworkerset_sigs_k8s_io_group_index}} r{{engine}}"
                    range: true
                  version: v0
                refId: A
            queryOptions: {}
            transformations: []
        description: KV cache utilization percentage on prefill workers
        id: 11
        links: []
        title: Prefill KV Cache Utilization
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
